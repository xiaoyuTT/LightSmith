# Alembic 配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 输出编码
output_encoding = utf-8

# 数据库连接 URL（运行时从环境变量覆盖，见 alembic/env.py）
sqlalchemy.url = postgresql://lightsmith:lightsmith@localhost:5432/lightsmith

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
